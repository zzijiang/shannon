<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香农 · Python 基础语法</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   CSS VARIABLES & RESET
   ═══════════════════════════════════════════════════════ */
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-hover: #1e2130;
  --primary: #0080ff;
  --primary-light: #4da6ff;
  --primary-dark: #0066cc;
  --primary-glow: #0080ff30;
  --success: #00b894;
  --success-bg: #00b89418;
  --danger: #ff6b6b;
  --danger-bg: #ff6b6b18;
  --warning: #feca57;
  --warning-bg: #feca5718;
  --text: #e2e2e2;
  --text-dim: #8a8a9a;
  --text-bright: #ffffff;
  --border: #2d3044;
  --input-bg: #0d1017;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Segoe UI', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --sidebar-w: 260px;
  --topbar-h: 56px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* ═══════════════════════════════════════════════════════
   LAYOUT: SIDEBAR + TOPBAR + MAIN
   ═══════════════════════════════════════════════════════ */
.app-layout {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  min-height: 100vh;
}

/* ── SIDEBAR ── */
.sidebar {
  grid-row: 1 / -1;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; color: #fff;
}
.sidebar-logo .logo-text { font-size: 18px; font-weight: 700; color: var(--text-bright); }
.sidebar-logo .logo-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.sidebar-stage {
  padding: 16px 20px 12px;
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sidebar-lessons { flex: 1; padding: 0 12px; }

.lesson-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 2px;
  font-size: 14px;
  color: var(--text-dim);
  position: relative;
}
.lesson-item:hover { background: #ffffff08; }
.lesson-item.active { background: var(--primary-glow); color: var(--primary-light); }
.lesson-item.completed { color: var(--success); }
.lesson-item.locked { opacity: 0.4; cursor: default; }
.lesson-item.locked:hover { background: none; }

.lesson-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0;
  border: 2px solid var(--border);
  background: var(--bg);
  transition: all 0.2s;
}
.lesson-item.active .lesson-icon { border-color: var(--primary); background: var(--primary); color: #fff; }
.lesson-item.completed .lesson-icon { border-color: var(--success); background: var(--success); color: #fff; }
.lesson-item.checkpoint .lesson-icon { border-radius: 6px; font-size: 11px; }

.lesson-name { flex: 1; line-height: 1.3; }
.lesson-name-sub { font-size: 11px; color: var(--text-dim); display: block; margin-top: 1px; }

.sidebar-stats {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
}
.stat-row {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--text-dim);
}
.stat-value { font-weight: 700; color: var(--text); }
.stat-value.xp { color: var(--primary-light); }
.stat-value.streak { color: #f9703e; }
.stat-value.level { color: var(--warning); }

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title { font-size: 16px; font-weight: 600; color: var(--text-bright); }
.topbar-right { display: flex; align-items: center; gap: 16px; }
.pyodide-status {
  font-size: 12px; padding: 4px 12px;
  border-radius: 12px;
  display: flex; align-items: center; gap: 6px;
}
.pyodide-status.loading { background: var(--warning-bg); color: var(--warning); }
.pyodide-status.ready { background: var(--success-bg); color: var(--success); }
.pyodide-status.error { background: var(--danger-bg); color: var(--danger); }
.pyodide-dot { width: 6px; height: 6px; border-radius: 50%; }
.pyodide-status.loading .pyodide-dot { background: var(--warning); animation: pulse 1s infinite; }
.pyodide-status.ready .pyodide-dot { background: var(--success); }
.pyodide-status.error .pyodide-dot { background: var(--danger); }

@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

.streak-badge {
  display: flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #f9703e22, #f9703e44);
  padding: 5px 12px; border-radius: 16px;
  font-size: 13px; color: #f9703e; font-weight: 600;
}

/* ── MAIN CONTENT ── */
.main-content {
  padding: 32px;
  overflow-y: auto;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
}

/* ═══════════════════════════════════════════════════════
   PROGRESS BAR (within lesson)
   ═══════════════════════════════════════════════════════ */
.progress-wrap {
  width: 100%; height: 6px;
  background: var(--border);
  border-radius: 3px;
  margin-bottom: 28px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* Phase tabs */
.phase-tabs {
  display: flex; gap: 4px; margin-bottom: 24px;
}
.phase-tab {
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px; font-weight: 500;
  border: 1px solid var(--border);
  background: none;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
}
.phase-tab:hover { border-color: var(--primary); color: var(--text); }
.phase-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.phase-tab.completed { border-color: var(--success); color: var(--success); }
.phase-tab.locked { opacity: 0.4; cursor: default; }

/* ═══════════════════════════════════════════════════════
   PAGE CARD (learn mode)
   ═══════════════════════════════════════════════════════ */
.page-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px;
  border: 1px solid var(--border);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

.page-label {
  font-size: 12px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 8px;
}
.page-title {
  font-size: 22px; font-weight: 700;
  margin-bottom: 16px; line-height: 1.4;
  color: var(--text-bright);
}
.page-desc {
  font-size: 15px; color: var(--text-dim);
  line-height: 1.8; margin-bottom: 20px;
}
.page-desc strong { color: var(--text); font-weight: 600; }

/* ═══════════════════════════════════════════════════════
   CODE BLOCKS & EDITORS
   ═══════════════════════════════════════════════════════ */
.code-block {
  background: var(--input-bg);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.8;
  color: #abb2bf;
  margin: 16px 0;
  border: 1px solid #1e2230;
  overflow-x: auto;
  white-space: pre;
}
.code-block .kw { color: #c678dd; }
.code-block .fn { color: #61afef; }
.code-block .str { color: #98c379; }
.code-block .num { color: #d19a66; }
.code-block .cm { color: #5c6370; font-style: italic; }
.code-block .op { color: #56b6c2; }
.code-block .var { color: #e5c07b; }

.code-inline {
  background: #1e2230;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
  color: #e5c07b;
}

/* Code editor */
.code-editor-wrap {
  margin: 16px 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.code-editor-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  background: #151822;
  border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text-dim);
}
.code-editor {
  width: 100%;
  min-height: 120px;
  background: var(--input-bg);
  border: none;
  color: #abb2bf;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.7;
  padding: 16px 20px;
  resize: vertical;
  outline: none;
  tab-size: 4;
}
.code-editor:focus { background: #0e1119; }

.run-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}
.run-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }
.run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.code-output {
  background: #0a0d14;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  color: var(--success);
  margin-top: 8px;
  min-height: 40px;
  white-space: pre-wrap;
  word-break: break-all;
}
.code-output.error { color: var(--danger); }
.code-output.empty { color: var(--text-dim); font-style: italic; }

/* ═══════════════════════════════════════════════════════
   OPTIONS (choice questions)
   ═══════════════════════════════════════════════════════ */
.options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.options.horizontal { flex-direction: row; flex-wrap: wrap; }

.opt-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  background: #151822;
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
  text-align: left;
  width: 100%;
}
.opt-btn:hover:not(.correct):not(.wrong):not(:disabled) { border-color: var(--primary); background: #1c2035; }
.opt-btn.correct { border-color: var(--success); background: var(--success-bg); cursor: default; }
.opt-btn.wrong { border-color: var(--danger); background: var(--danger-bg); cursor: default; }
.opt-btn:disabled { cursor: default; }

.opt-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0;
}
.opt-btn.correct .opt-letter { background: var(--success); color: #fff; }
.opt-btn.wrong .opt-letter { background: var(--danger); color: #fff; }

/* ═══════════════════════════════════════════════════════
   FILL-IN-THE-BLANK
   ═══════════════════════════════════════════════════════ */
.fill-blank-wrap {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  margin: 16px 0;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 2.2;
  background: var(--input-bg);
  padding: 16px 20px;
  border-radius: var(--radius-sm);
  border: 1px solid #1e2230;
}
.fill-input {
  background: #1a1f2e;
  border: 2px dashed var(--primary);
  border-radius: 4px;
  color: #e5c07b;
  padding: 3px 10px;
  font-family: var(--mono);
  font-size: 14px;
  outline: none;
  transition: all 0.2s;
  min-width: 80px;
}
.fill-input:focus { border-style: solid; border-color: var(--primary-light); }
.fill-input.correct { border-color: var(--success); border-style: solid; background: #00b89412; }
.fill-input.wrong { border-color: var(--danger); border-style: solid; }

/* ═══════════════════════════════════════════════════════
   FEEDBACK
   ═══════════════════════════════════════════════════════ */
.feedback {
  margin-top: 20px;
  padding: 16px 20px;
  border-radius: 10px;
  font-size: 14px;
  line-height: 1.7;
  animation: fadeIn 0.3s;
}
.feedback.correct { background: var(--success-bg); border: 1px solid #00b89444; color: #55efc4; }
.feedback.wrong { background: var(--danger-bg); border: 1px solid #ff6b6b44; color: #ff8e8e; }
.feedback.info { background: #0080ff18; border: 1px solid #0080ff44; color: var(--primary-light); }

/* ═══════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════ */
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 28px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
  margin-top: 20px;
}
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px var(--primary-glow); }
.btn-primary:disabled { opacity: 0.4; cursor: default; transform: none; box-shadow: none; }

.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px;
  background: transparent;
  color: var(--primary-light);
  border: 1px solid var(--primary);
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
}
.btn-secondary:hover { background: var(--primary-glow); }

.btn-check {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px;
  background: var(--success);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.2s;
  margin-top: 12px;
}
.btn-check:hover { filter: brightness(1.1); }

/* ═══════════════════════════════════════════════════════
   HEARTS
   ═══════════════════════════════════════════════════════ */
.hearts-bar {
  display: flex; align-items: center; gap: 4px;
  font-size: 18px;
}
.heart { transition: all 0.3s; }
.heart.lost { opacity: 0.2; transform: scale(0.8); }

/* ═══════════════════════════════════════════════════════
   CHECKPOINT / SCORE
   ═══════════════════════════════════════════════════════ */
.score-card {
  text-align: center;
  padding: 40px;
}
.score-big {
  font-size: 64px; font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--success));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.score-label { font-size: 16px; color: var(--text-dim); margin-bottom: 24px; }

.score-breakdown {
  display: flex; justify-content: center; gap: 32px;
  margin: 24px 0;
  text-align: center;
}
.score-stat { display: flex; flex-direction: column; gap: 4px; }
.score-stat-val { font-size: 24px; font-weight: 700; color: var(--text-bright); }
.score-stat-label { font-size: 12px; color: var(--text-dim); }

/* Timer */
.timer-bar {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
.timer-bar.warning { color: var(--danger); }

/* ═══════════════════════════════════════════════════════
   TRUE/FALSE BUTTONS
   ═══════════════════════════════════════════════════════ */
.tf-options {
  display: flex; gap: 12px; margin-top: 20px;
}
.tf-btn {
  flex: 1;
  padding: 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: #151822;
  color: var(--text);
  font-size: 16px; font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font);
  text-align: center;
}
.tf-btn:hover:not(.correct):not(.wrong):not(:disabled) { border-color: var(--primary); }
.tf-btn.correct { border-color: var(--success); background: var(--success-bg); }
.tf-btn.wrong { border-color: var(--danger); background: var(--danger-bg); }

/* ═══════════════════════════════════════════════════════
   CONFETTI
   ═══════════════════════════════════════════════════════ */
.confetti-container {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 10px; height: 10px;
  top: -20px;
  animation: confettiFall 3s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ═══════════════════════════════════════════════════════
   WELCOME CARD
   ═══════════════════════════════════════════════════════ */
.welcome-card {
  text-align: center;
  padding: 60px 40px;
}
.welcome-card h2 {
  font-size: 28px; font-weight: 800;
  margin-bottom: 16px;
  background: linear-gradient(135deg, var(--primary-light), var(--success));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.welcome-card p { font-size: 16px; color: var(--text-dim); line-height: 1.8; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════════════
   MISC
   ═══════════════════════════════════════════════════════ */
.question-counter {
  font-size: 13px; color: var(--text-dim);
  margin-bottom: 16px;
}

.highlight-box {
  background: #0080ff10;
  border-left: 3px solid var(--primary);
  padding: 14px 18px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin: 16px 0;
  font-size: 14px;
  line-height: 1.7;
  color: var(--primary-light);
}

.concept-box {
  background: #151822;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  margin: 16px 0;
}
.concept-box h4 {
  font-size: 14px; color: var(--primary-light);
  margin-bottom: 8px;
}
.concept-box p, .concept-box ul {
  font-size: 14px; color: var(--text-dim);
  line-height: 1.7;
}
.concept-box ul { padding-left: 20px; }
.concept-box li { margin-bottom: 4px; }

/* Scrollbar for main */
.main-content::-webkit-scrollbar { width: 6px; }
.main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Selection */
::selection { background: var(--primary); color: #fff; }
</style>
</head>
<body>

<div class="app-layout">
  <!-- ═══════ SIDEBAR ═══════ -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- ═══════ TOPBAR ═══════ -->
  <header class="topbar" id="topbar"></header>

  <!-- ═══════ MAIN ═══════ -->
  <main class="main-content" id="main"></main>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confetti"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   ██  STATE MANAGEMENT
   ═══════════════════════════════════════════════════════════════ */
const state = {
  currentLesson: 0,       // index into LESSONS
  currentPhase: 'learn',  // 'learn' | 'practice' | null (for checkpoint)
  currentPage: 0,         // page index within current phase
  lessonStatus: [         // 'locked','current','completed'
    'current','locked','locked','locked','locked','locked','locked'
  ],
  phaseStatus: {},        // { '0-learn':'current', '0-practice':'locked', ... }
  xp: 0,
  streak: 1,
  hearts: 3,
  maxHearts: 3,
  answered: {},           // track answered states: "lesson-phase-page" => answer
  codeContents: {},       // preserve code editor contents
  checkpointScore: {},    // checkpoint results
  checkpointTimer: null,
  checkpointStartTime: null,
};

// Initialize phase status
function initPhaseStatus() {
  LESSONS.forEach((l, i) => {
    if (l.type === 'checkpoint') {
      state.phaseStatus[i + '-checkpoint'] = (i === 0 || state.lessonStatus[i] !== 'locked') ? 'current' : 'locked';
    } else {
      state.phaseStatus[i + '-learn'] = state.lessonStatus[i] === 'current' ? 'current' : (state.lessonStatus[i] === 'completed' ? 'completed' : 'locked');
      state.phaseStatus[i + '-practice'] = state.lessonStatus[i] === 'completed' ? 'completed' : 'locked';
    }
  });
}

// Save / Load state
function saveState() {
  try {
    const s = { ...state };
    delete s.checkpointTimer;
    localStorage.setItem('shannon-state', JSON.stringify(s));
  } catch(e) {}
}
function loadState() {
  try {
    const saved = localStorage.getItem('shannon-state');
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(state, s);
      state.checkpointTimer = null;
    }
  } catch(e) {}
}

let pyodideInstance = null;
let pyodideReady = false;
let pyodideLoading = true;

async function initPyodide() {
  try {
    pyodideInstance = await loadPyodide();
    pyodideReady = true;
    pyodideLoading = false;
    renderTopbar();
  } catch(e) {
    pyodideLoading = false;
    renderTopbar();
    console.error('Pyodide load error:', e);
  }
}

async function runPython(code) {
  if (!pyodideReady) return { stdout: '', error: '正在加载 Python 引擎，请稍候...' };
  try {
    pyodideInstance.runPython(`
import sys, io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
`);
    await pyodideInstance.runPythonAsync(code);
    const stdout = pyodideInstance.runPython('sys.stdout.getvalue()');
    return { stdout: stdout.trim(), error: null };
  } catch(e) {
    const errMsg = translateError(e.message || String(e));
    return { stdout: '', error: errMsg };
  }
}

function translateError(msg) {
  // Extract just the last line of the traceback for user-friendliness
  const lines = msg.split('\n').filter(l => l.trim());
  const lastLine = lines[lines.length - 1] || msg;

  if (lastLine.includes('SyntaxError')) {
    if (lastLine.includes('EOL while scanning')) return '语法错误：字符串没有正确关闭，检查一下引号是否配对。';
    if (lastLine.includes('unexpected EOF')) return '语法错误：代码不完整，可能缺少了什么。';
    if (lastLine.includes('invalid syntax')) return '语法错误：Python 看不懂这行代码，检查拼写和符号。';
    return '语法错误：' + lastLine.replace('SyntaxError:', '').trim();
  }
  if (lastLine.includes('NameError')) {
    const match = lastLine.match(/name '(.+?)' is not defined/);
    if (match) return `名称错误：'${match[1]}' 没有定义。是不是忘了赋值，或者字符串忘了加引号？`;
    return '名称错误：使用了一个不存在的变量名。';
  }
  if (lastLine.includes('TypeError')) {
    if (lastLine.includes('can only concatenate str')) return '类型错误：不能把字符串和数字直接拼接，需要用 str() 转换。';
    return '类型错误：' + lastLine.replace('TypeError:', '').trim();
  }
  if (lastLine.includes('IndentationError')) {
    return '缩进错误：Python 对缩进（空格）要求很严格，检查是否对齐了。';
  }
  if (lastLine.includes('ZeroDivisionError')) return '除零错误：不能除以 0！';
  if (lastLine.includes('ValueError')) return '值错误：' + lastLine.replace('ValueError:', '').trim();
  return lastLine;
}

/* ── LEARN PHASE ── */

  const pages = LEARN_PAGES[lesson.id];
  if (!pages) return '<div class="page-card"><p>课程内容加载中...</p></div>';

  const page = pages[state.currentPage];
  const progress = ((state.currentPage + 1) / pages.length) * 100;
  const stateKey = `${state.currentLesson}-learn-${state.currentPage}`;
  const answered = state.answered[stateKey];

  let html = `
    <div class="progress-wrap"><div class="progress-fill" style="width:${progress}%"></div></div>

      <div class="page-label">第 ${state.currentPage + 1} / ${pages.length} 页</div>

  `;

  // Extra HTML (concept boxes etc)
  if (page.extraHTML) {
    html += page.extraHTML;
  }

  // Code display
  if (page.code) {
    html += `<div class="code-block">${page.code}</div>`;
    if (page.codeOutput) {
      html += `<div class="code-output">${escapeHTML(page.codeOutput)}</div>`;
    }
  }
  if (page.codeShow) {
    html += `<div class="code-block">${page.codeShow}</div>`;

  if (page.type === 'info') {

  } else if (page.type === 'code') {

  }

  html += '</div>';
  return html;
}

function renderChoiceInteraction(page, stateKey, answered) {
  let html = '<div class="options">';
  const letters = ['A', 'B', 'C', 'D'];
  page.options.forEach((opt, i) => {
    let cls = '';
    let disabled = '';
    if (answered !== undefined) {
      disabled = 'disabled';
      if (i === page.correct) cls = 'correct';
      else if (i === answered) cls = 'wrong';

    // Unescape \\n for display
    const displayOpt = opt.replace(/\\n/g, '<br>');
    html += `<button class="opt-btn ${cls}" ${disabled} onclick="handleLearnChoice(${i}, ${page.correct}, '${stateKey}')">

/* ═══════════════════════════════════════════════════════════════
   ██  EVENT HANDLERS
   ═══════════════════════════════════════════════════════════════ */

function selectLesson(idx) {
  if (state.lessonStatus[idx] === 'locked') return;
  state.currentLesson = idx;
  state.currentPage = 0;
  const lesson = LESSONS[idx];
  if (lesson.type === 'checkpoint') {
    state.currentPhase = null;
  } else {
    // Determine phase
    const learnStatus = state.phaseStatus[idx + '-learn'];
    const practiceStatus = state.phaseStatus[idx + '-practice'];
    if (learnStatus === 'completed' && practiceStatus !== 'completed') {
      state.currentPhase = 'practice';
    } else {
      state.currentPhase = 'learn';
    }
  }
  state.hearts = state.maxHearts;
  saveState();
  render();
}

function switchPhase(phase) {
  const key = state.currentLesson + '-' + phase;
  if (state.phaseStatus[key] === 'locked') return;
  state.currentPhase = phase;
  state.currentPage = 0;
  if (phase === 'practice') state.hearts = state.maxHearts;
  saveState();
  renderMain();
}

function nextPage() {
  const lesson = LESSONS[state.currentLesson];

  if (lesson.type === 'checkpoint') {
    const questions = CHECKPOINT_QUESTIONS[lesson.id];
    if (state.currentPage < questions.length - 1) {
      state.currentPage++;
    } else {
      finishCheckpoint();
    }
    saveState();
    renderMain();
    return;
  }

  if (state.currentPhase === 'learn') {
    const pages = LEARN_PAGES[lesson.id];
    if (state.currentPage < pages.length - 1) {
      state.currentPage++;
    } else {
      // Learn phase complete
      state.phaseStatus[state.currentLesson + '-learn'] = 'completed';
      state.phaseStatus[state.currentLesson + '-practice'] = 'current';
      state.currentPhase = 'practice';
      state.currentPage = 0;
      state.hearts = state.maxHearts;
      state.xp += 20;
    }
  } else if (state.currentPhase === 'practice') {
    const questions = PRACTICE_QUESTIONS[lesson.id];
    if (state.currentPage < questions.length - 1) {
      state.currentPage++;
    } else {
      state.currentPage = questions.length; // trigger complete screen
    }
  }
  saveState();
  renderMain();
}

function completeLesson() {
  const idx = state.currentLesson;
  state.lessonStatus[idx] = 'completed';
  state.phaseStatus[idx + '-learn'] = 'completed';
  state.phaseStatus[idx + '-practice'] = 'completed';
  state.xp += PRACTICE_QUESTIONS[LESSONS[idx].id].length * 10;

  // Unlock next
  if (idx + 1 < LESSONS.length) {
    if (state.lessonStatus[idx + 1] === 'locked') {
      state.lessonStatus[idx + 1] = 'current';
      const next = LESSONS[idx + 1];
      if (next.type === 'checkpoint') {
        state.phaseStatus[(idx + 1) + '-checkpoint'] = 'current';
      } else {
        state.phaseStatus[(idx + 1) + '-learn'] = 'current';
        state.phaseStatus[(idx + 1) + '-practice'] = 'locked';
      }
    }
    state.currentLesson = idx + 1;
    state.currentPage = 0;
    state.currentPhase = LESSONS[idx + 1].type === 'checkpoint' ? null : 'learn';
  }
  state.hearts = state.maxHearts;
  saveState();
  render();
}

function completeCheckpoint() {
  const idx = state.currentLesson;
  state.lessonStatus[idx] = 'completed';
  state.checkpointStartTime = null;
  if (state.checkpointTimer) { clearInterval(state.checkpointTimer); state.checkpointTimer = null; }

  // Unlock next
  if (idx + 1 < LESSONS.length) {
    if (state.lessonStatus[idx + 1] === 'locked') {
      state.lessonStatus[idx + 1] = 'current';
      const next = LESSONS[idx + 1];
      if (next.type === 'checkpoint') {
        state.phaseStatus[(idx + 1) + '-checkpoint'] = 'current';
      } else {
        state.phaseStatus[(idx + 1) + '-learn'] = 'current';
        state.phaseStatus[(idx + 1) + '-practice'] = 'locked';
      }
    }
    state.currentLesson = idx + 1;
    state.currentPage = 0;
    state.currentPhase = LESSONS[idx + 1].type === 'checkpoint' ? null : 'learn';
  }
  state.hearts = state.maxHearts;
  saveState();
  render();
}

function retryCheckpoint() {
  const lesson = LESSONS[state.currentLesson];
  // Clear answers for this checkpoint
  const questions = CHECKPOINT_QUESTIONS[lesson.id];
  questions.forEach((_, i) => {
    delete state.answered[`${state.currentLesson}-checkpoint-${i}`];
    delete state.codeContents[`${state.currentLesson}-checkpoint-${i}`];
    delete state.codeContents[`${state.currentLesson}-checkpoint-${i}-code`];
    delete state.codeContents[`${state.currentLesson}-checkpoint-${i}-output`];
  });
  delete state.checkpointScore[lesson.id];
  state.checkpointStartTime = null;
  state.currentPage = 0;
  saveState();
  render();
}

function finishCheckpoint() {
  const lesson = LESSONS[state.currentLesson];
  const questions = CHECKPOINT_QUESTIONS[lesson.id];
  let correct = 0;
  questions.forEach((q, i) => {
    const ans = state.answered[`${state.currentLesson}-checkpoint-${i}`];
    if (q.type === 'choice') { if (ans === q.correct) correct++; }
    else if (q.type === 'tf') { if (ans === q.correct) correct++; }
    else if (q.type === 'fill') { if (ans === true) correct++; }
    else if (q.type === 'code') { if (ans === true) correct++; }
  });
  const score = Math.round((correct / questions.length) * 100);
  state.checkpointScore[lesson.id] = { score, correct, total: questions.length };
  state.xp += correct * 15;
  if (state.checkpointTimer) { clearInterval(state.checkpointTimer); state.checkpointTimer = null; }
  saveState();
}

/* ── Learn phase handlers ── */
function handleLearnChoice(selected, correct, stateKey) {

}

async function handleLearnCodeRun(stateKey) {
  const editorKey = stateKey + '-code';
  const outputKey = stateKey + '-output';

  if (!editor) return;
  const code = editor.value;
  state.codeContents[editorKey] = code;

  const outputEl = document.getElementById('output-' + stateKey);

  outputEl.className = 'code-output';

  const result = await runPython(code);
  if (result.error) {
    outputEl.textContent = result.error;
    outputEl.className = 'code-output error';
    state.codeContents[outputKey] = 'Error: ' + result.error;
  } else {
    outputEl.textContent = result.stdout || '(无输出)';
    outputEl.className = 'code-output' + (result.stdout ? '' : ' empty');
    state.codeContents[outputKey] = result.stdout;
  }

  // Check if correct
  const lesson = LESSONS[state.currentLesson];
  const page = LEARN_PAGES[lesson.id][state.currentPage];
  if (page.check && !result.error && page.check(result.stdout)) {
    state.answered[stateKey] = true;
    state.xp += 10;
    saveState();
    renderMain();
  } else {
    saveState();
  }
}

function escapeHTML(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function saveEditorContent(el) {
  const key = el.getAttribute('data-key');
  if (key) state.codeContents[key] = el.value;
}

function attachEventListeners() {
  // Tab key in code editors -> insert spaces
  document.querySelectorAll('.code-editor').forEach(editor => {
    editor.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
        saveEditorContent(this);
      }
    });
  });
}

function startCheckpointTimer() {
  if (state.checkpointTimer) clearInterval(state.checkpointTimer);
  state.checkpointTimer = setInterval(() => {
    const elapsed = Math.floor((Date.now() - state.checkpointStartTime) / 1000);
    const remaining = Math.max(0, 30 * 60 - elapsed);
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    const timerEl = document.getElementById('timer');
    if (timerEl) {
      timerEl.textContent = `\u23F1 ${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      if (remaining < 300) timerEl.className = 'timer-bar warning';
    }
    if (remaining <= 0) {
      clearInterval(state.checkpointTimer);
      finishCheckpoint();
      renderMain();
    }
  }, 1000);
}

function showConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#0080ff','#4da6ff','#00b894','#feca57','#ff6b6b','#a29bfe'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 1 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}
