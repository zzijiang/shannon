<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>香农 · matplotlib 入门单元</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --primary: #6c5ce7;
  --primary-light: #a29bfe;
  --success: #00b894;
  --danger: #ff6b6b;
  --warning: #feca57;
  --text: #e2e2e2;
  --text-dim: #8a8a9a;
  --border: #2d3044;
  --radius: 12px;
  --font: 'Segoe UI', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--bg); color:var(--text); min-height:100vh; }

/* Header & Nav */
.header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); background:var(--card); }
.header h1 { font-size:18px; font-weight:600; color:var(--primary-light); }
.streak-badge { display:flex; align-items:center; gap:6px; background:linear-gradient(135deg,#f9703e22,#f9703e44); padding:6px 14px; border-radius:20px; font-size:14px; color:#f9703e; font-weight:600; }
.nav { display:flex; gap:0; padding:0 24px; background:var(--card); border-bottom:1px solid var(--border); }
.nav-btn { padding:14px 24px; font-size:14px; font-weight:500; border:none; background:none; color:var(--text-dim); cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; font-family:var(--font); }
.nav-btn:hover { color:var(--text); }
.nav-btn.active { color:var(--primary-light); border-bottom-color:var(--primary); }

/* Layout */
.main { max-width:800px; margin:0 auto; padding:32px 24px 120px; }
.progress-bar-wrap { width:100%; height:6px; background:var(--border); border-radius:3px; margin-bottom:32px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,var(--primary),var(--success)); border-radius:3px; transition:width .5s; }

/* Cards */
.page-card { background:var(--card); border-radius:var(--radius); padding:32px; border:1px solid var(--border); animation:fadeIn .3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.page-label { font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.page-title { font-size:22px; font-weight:700; margin-bottom:20px; line-height:1.4; }
.page-desc { font-size:15px; color:var(--text-dim); line-height:1.7; margin-bottom:24px; }

/* Side by side */
.side-by-side { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px; }
.data-table { background:#151822; border-radius:8px; padding:16px; border:1px solid var(--border); }
.data-table h4 { font-size:13px; color:var(--text-dim); margin-bottom:12px; }
.data-table table { width:100%; font-size:14px; }
.data-table td { padding:6px 0; border-bottom:1px solid #1e2230; }
.data-table td:last-child { text-align:right; font-weight:600; }
.chart-box { background:#151822; border-radius:8px; padding:16px; border:1px solid var(--border); }
.chart-box h4 { font-size:13px; color:var(--text-dim); margin-bottom:12px; }

/* Options */
.options { display:flex; flex-direction:column; gap:10px; margin-top:20px; }
.options.horizontal { flex-direction:row; flex-wrap:wrap; }
.opt-btn { display:flex; align-items:center; gap:12px; padding:14px 18px; background:#151822; border:2px solid var(--border); border-radius:10px; color:var(--text); font-size:15px; cursor:pointer; transition:all .2s; font-family:var(--font); text-align:left; }
.opt-btn:hover { border-color:var(--primary); background:#1c2035; }
.opt-btn.correct { border-color:var(--success); background:#00b89422; }
.opt-btn.wrong { border-color:var(--danger); background:#ff6b6b22; }
.opt-btn .opt-letter { width:28px; height:28px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; flex-shrink:0; }
.opt-btn.correct .opt-letter { background:var(--success); color:#fff; }
.opt-btn.wrong .opt-letter { background:var(--danger); color:#fff; }

/* Chart options grid */
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px; }
.chart-option { background:#151822; border:2px solid var(--border); border-radius:10px; padding:12px; cursor:pointer; transition:all .2s; text-align:center; }
.chart-option:hover { border-color:var(--primary); }
.chart-option.correct { border-color:var(--success); background:#00b89415; }
.chart-option.wrong { border-color:var(--danger); background:#ff6b6b15; }
.chart-option .opt-text { font-size:12px; color:var(--text-dim); margin-top:6px; }

/* Feedback */
.feedback { margin-top:20px; padding:16px; border-radius:10px; font-size:14px; line-height:1.6; animation:fadeIn .3s; }
.feedback.correct { background:#00b89418; border:1px solid #00b89444; color:#55efc4; }
.feedback.wrong { background:#ff6b6b18; border:1px solid #ff6b6b44; color:#ff8e8e; }
.feedback.info { background:#6c5ce718; border:1px solid #6c5ce744; color:var(--primary-light); }

/* Code */
.code-block { background:#0d1017; border-radius:8px; padding:16px 20px; font-family:var(--mono); font-size:14px; line-height:1.7; color:#abb2bf; margin:16px 0; border:1px solid #1e2230; overflow-x:auto; }
.code-block .kw { color:#c678dd; } .code-block .fn { color:#61afef; } .code-block .str { color:#98c379; }
.code-block .num { color:#d19a66; } .code-block .cm { color:#5c6370; font-style:italic; }
.code-inline { background:#1e2230; padding:2px 7px; border-radius:4px; font-family:var(--mono); font-size:13px; color:#e5c07b; }

/* Input */
.input-line { display:flex; align-items:center; gap:8px; margin:16px 0; font-family:var(--mono); font-size:14px; }
.input-line input { background:#0d1017; border:2px solid var(--border); border-radius:6px; color:#e5c07b; padding:8px 12px; font-family:var(--mono); font-size:14px; width:140px; outline:none; transition:border-color .2s; }
.input-line input:focus { border-color:var(--primary); }
.input-line input.correct { border-color:var(--success); background:#00b89412; }
.input-line input.wrong { border-color:var(--danger); }

/* Code fill */
.code-fill { background:#0d1017; border-radius:8px; padding:16px 20px; font-family:var(--mono); font-size:14px; line-height:2.2; color:#abb2bf; margin:16px 0; border:1px solid #1e2230; }
.code-fill input { background:#1a1f2e; border:2px dashed var(--primary); border-radius:4px; color:#e5c07b; padding:3px 8px; font-family:var(--mono); font-size:14px; outline:none; transition:all .2s; }
.code-fill input:focus { border-style:solid; border-color:var(--primary-light); }
.code-fill input.correct { border-color:var(--success); border-style:solid; background:#00b89418; }
.code-fill input.wrong { border-color:var(--danger); border-style:solid; }

/* Buttons */
.btn-primary { display:inline-flex; align-items:center; gap:8px; padding:12px 28px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:all .2s; font-family:var(--font); margin-top:16px; }
.btn-primary:hover { background:#5a4bd1; transform:translateY(-1px); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.btn-run { background:var(--success); } .btn-run:hover { background:#00a884; }
.btn-hint { background:transparent; border:1px solid var(--border); color:var(--text-dim); font-size:13px; padding:8px 16px; margin-top:8px; }
.btn-hint:hover { border-color:var(--primary); color:var(--text); background:#1c2035; }
.btn-reset { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
.btn-reset:hover { border-color:var(--danger); color:var(--danger); }
.next-wrap { display:flex; justify-content:flex-end; margin-top:24px; }

/* Code Editor */
.code-editor { background:#0d1017; border-radius:8px; border:1px solid #1e2230; overflow:hidden; margin:16px 0; }
.code-editor-header { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:#151822; border-bottom:1px solid #1e2230; font-size:12px; color:var(--text-dim); }
.code-editor textarea { width:100%; min-height:120px; background:#0d1017; border:none; color:#abb2bf; font-family:var(--mono); font-size:14px; line-height:1.7; padding:16px; resize:vertical; outline:none; tab-size:4; }
.editor-buttons { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

/* Output */
.output-area { background:#0d1017; border-radius:8px; border:1px solid #1e2230; margin:12px 0; overflow:hidden; animation:fadeIn .3s; }
.output-header { padding:8px 16px; font-size:12px; color:var(--text-dim); background:#151822; border-bottom:1px solid #1e2230; }
.output-body { padding:16px; }
.output-text { font-family:var(--mono); font-size:13px; color:var(--success); line-height:1.6; white-space:pre-wrap; }
.output-error { font-family:var(--mono); font-size:13px; color:var(--danger); line-height:1.6; white-space:pre-wrap; }
.output-img { max-width:100%; border-radius:6px; margin-top:8px; }

/* Loading */
.loading-box { text-align:center; padding:60px 20px; }
.loading-box .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 16px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-box p { color:var(--text-dim); font-size:14px; }
.pyodide-status { font-size:12px; padding:6px 14px; border-radius:20px; display:inline-flex; align-items:center; gap:6px; }
.pyodide-status.loading { background:#feca5722; color:#feca57; }
.pyodide-status.ready { background:#00b89422; color:#00b894; }
.pyodide-status.error { background:#ff6b6b22; color:#ff6b6b; }

/* Project steps dots */
.project-steps { display:flex; gap:4px; margin-bottom:24px; }
.project-step-dot { flex:1; height:6px; background:var(--border); border-radius:3px; transition:background .3s; }
.project-step-dot.done { background:var(--success); }
.project-step-dot.active { background:var(--primary); }

/* Drills */
.drill-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
.drill-count { font-size:14px; color:var(--text-dim); }
.drill-score { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:600; }
.order-list { display:flex; flex-direction:column; gap:8px; margin-top:16px; }
.order-item { display:flex; align-items:center; gap:12px; padding:12px 16px; background:#151822; border:2px solid var(--border); border-radius:8px; font-family:var(--mono); font-size:14px; cursor:grab; transition:all .15s; user-select:none; }
.order-item:hover { border-color:var(--primary); }
.order-item .order-num { width:24px; height:24px; border-radius:50%; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--text-dim); font-family:var(--font); }
.match-item { padding:10px 14px; background:#151822; border:2px solid var(--border); border-radius:8px; font-size:14px; cursor:pointer; transition:all .15s; text-align:center; }
.match-item:hover { border-color:var(--primary); }
.match-item.selected { border-color:var(--primary); background:#2a2650; }
.match-item.matched { border-color:var(--success); background:#00b89418; }

/* Hint */
.hint-box { background:#6c5ce712; border:1px solid #6c5ce733; border-radius:8px; padding:12px 16px; margin-top:12px; font-size:13px; color:var(--primary-light); line-height:1.6; animation:fadeIn .3s; }
.hint-box code { background:#1e2230; padding:2px 6px; border-radius:3px; font-family:var(--mono); color:#e5c07b; }

/* Summary */
.summary-card { text-align:center; padding:48px 32px; }
.summary-card .emoji { font-size:64px; margin-bottom:16px; }
.summary-card h2 { font-size:26px; margin-bottom:12px; }
.summary-card .steps { background:#0d1017; border-radius:8px; padding:20px; text-align:left; font-size:15px; line-height:2; color:var(--text-dim); margin:24px 0; border:1px solid #1e2230; }
.xp-badge { display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,var(--primary),#a29bfe); padding:10px 24px; border-radius:24px; font-size:16px; font-weight:700; color:#fff; margin-top:8px; }

/* Confetti */
.confetti-overlay { position:fixed; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:9999; }
.confetti-piece { position:absolute; width:10px; height:10px; border-radius:2px; animation:confettiFall 2.5s ease-out forwards; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

/* Step done */
.step-done-banner { display:flex; align-items:center; gap:10px; padding:12px 16px; background:#00b89418; border:1px solid #00b89444; border-radius:8px; margin-top:16px; font-size:14px; color:var(--success); animation:fadeIn .3s; }

/* Goal box */
.goal-box { background:linear-gradient(135deg,#6c5ce712,#a29bfe08); border:1px solid #6c5ce733; border-radius:10px; padding:16px 20px; margin-bottom:20px; }
.goal-box h3 { font-size:14px; color:var(--primary-light); margin-bottom:6px; }
.goal-box p { font-size:14px; color:var(--text-dim); line-height:1.6; }
</style>
</head>
<body>

<div class="header">
  <h1>🔬 香农 · matplotlib 入门</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <div id="pyodide-status" class="pyodide-status loading">⏳ Python 加载中...</div>
    <div class="streak-badge">🔥 连续 3 天</div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="switchSection('explore')">🧭 引导探索</button>
  <button class="nav-btn" onclick="switchSection('drill')">⚡ 刷卡练习</button>
  <button class="nav-btn" onclick="switchSection('project')">🚀 项目实战</button>
</nav>

<div class="main" id="content"></div>

<script>
// ==================== STATE ====================
let pyodide = null;
let pyodideReady = false;
let pyodideError = false;

const state = {
  section: 'explore',
  explore: { page: 0, answered: {} },
  drill: { index: 0, score: 0, hearts: 3, answered: {}, currentOrder: null, matchState: null },
  project: { step: -1, outputs: {}, hintLevel: {} }
};

const chartInstances = {};
function destroyCharts() {
  Object.values(chartInstances).forEach(c => { try{c.destroy()}catch(e){} });
  for (const k in chartInstances) delete chartInstances[k];
}

// ==================== PYODIDE ====================
async function initPyodide() {
  try {
    updatePyodideStatus('loading', '⏳ 加载 Python...');
    pyodide = await loadPyodide();
    updatePyodideStatus('loading', '⏳ 安装 matplotlib...');
    await pyodide.loadPackage(['matplotlib','numpy']);

    // Try to load Chinese font
    updatePyodideStatus('loading', '⏳ 配置字体...');
    try {
      const resp = await fetch('https://cdn.jsdelivr.net/gh/lxgw/LxgwWenKai@1.330/fonts/TTF/LXGWWenKai-Regular.ttf');
      if (resp.ok) {
        const buf = await resp.arrayBuffer();
        pyodide.FS.writeFile('/tmp/chinese.ttf', new Uint8Array(buf));
        await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use('AGG')
import matplotlib.pyplot as plt
import matplotlib.font_manager as fm
fm.fontManager.addfont('/tmp/chinese.ttf')
plt.rcParams['font.sans-serif'] = ['LXGW WenKai'] + plt.rcParams['font.sans-serif']
plt.rcParams['axes.unicode_minus'] = False
`);
      } else { throw new Error('font fetch failed'); }
    } catch(e) {
      console.warn('Chinese font failed, using defaults:', e);
      await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use('AGG')
import matplotlib.pyplot as plt
plt.rcParams['axes.unicode_minus'] = False
`);
    }

    // Dark theme
    await pyodide.runPythonAsync(`
plt.rcParams.update({
    'figure.facecolor': '#151822',
    'axes.facecolor': '#0d1017',
    'text.color': '#e2e2e2',
    'axes.labelcolor': '#8a8a9a',
    'xtick.color': '#8a8a9a',
    'ytick.color': '#8a8a9a',
    'axes.edgecolor': '#2d3044',
    'grid.color': '#1e2230',
    'figure.figsize': [8, 4],
    'figure.dpi': 100,
})
`);

    pyodideReady = true;
    updatePyodideStatus('ready', '✅ Python 已就绪');
    if (state.section === 'project') render();
  } catch(e) {
    pyodideError = true;
    updatePyodideStatus('error', '❌ Python 加载失败');
    console.error('Pyodide init failed:', e);
  }
}

function updatePyodideStatus(cls, text) {
  const el = document.getElementById('pyodide-status');
  if (el) { el.className = 'pyodide-status ' + cls; el.textContent = text; }
}

async function executePython(code) {
  if (!pyodideReady) throw new Error('Python 未就绪');

  // Reset
  await pyodide.runPythonAsync(`
import sys, io
plt.close('all')
_captured_out = io.StringIO()
_captured_err = io.StringIO()
sys.stdout = _captured_out
sys.stderr = _captured_err
`);

  let error = null;
  try {
    await pyodide.runPythonAsync(code);
  } catch(e) {
    error = e.message.split('\n').filter(l => !l.startsWith('  File "<exec>"')).join('\n').trim();
    // Simplify error for students
    const lines = error.split('\n');
    error = lines.slice(Math.max(0, lines.length - 3)).join('\n');
  }

  const stdout = pyodide.runPython(`
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
_captured_out.getvalue()
`);

  // Capture plots
  let plots = [];
  try {
    const plotProxy = pyodide.runPython(`
import io as _io, base64 as _b64
_plot_results = []
for _i in plt.get_fignums():
    _fig = plt.figure(_i)
    _buf = _io.BytesIO()
    _fig.savefig(_buf, format='png', dpi=120, bbox_inches='tight')
    _buf.seek(0)
    _plot_results.append(_b64.b64encode(_buf.read()).decode())
plt.close('all')
_plot_results
`);
    plots = plotProxy.toJs();
    plotProxy.destroy();
  } catch(e) {}

  return { stdout, error, plots };
}

// ==================== NAV ====================
function switchSection(s) {
  state.section = s;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => {
    if ((s==='explore' && b.textContent.includes('探索')) ||
        (s==='drill' && b.textContent.includes('练习')) ||
        (s==='project' && b.textContent.includes('项目')))
      b.classList.add('active');
  });
  render();
}

function render() {
  destroyCharts();
  const el = document.getElementById('content');
  if (state.section === 'explore') renderExplore(el);
  else if (state.section === 'drill') renderDrill(el);
  else renderProject(el);
}

// ==================== EXPLORE ====================
const EXPLORE_TOTAL = 8;

function renderExplore(el) {
  const p = state.explore.page;
  const pct = (p / (EXPLORE_TOTAL - 1) * 100).toFixed(0);
  let html = `<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>`;
  html += `<div class="page-card"><div class="page-label">探索 · 第 ${p+1} / ${EXPLORE_TOTAL} 页</div>`;
  html += [renderE0,renderE1,renderE2,renderE3,renderE4,renderE5,renderE6,renderE7][p]();
  html += `</div>`;
  el.innerHTML = html;
  setTimeout(() => { [initE0,initE1,initE2,initE3,initE4,()=>{},()=>{},()=>{}][p](); }, 50);
}

function exploreNext() {
  if (state.explore.page < EXPLORE_TOTAL - 1) { state.explore.page++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
}
function answerExplore(page, ans) {
  if (state.explore.answered[page] !== undefined) return;
  state.explore.answered[page] = ans; render();
}

// E0: Hook
function renderE0() {
  const a = state.explore.answered[0];
  return `
    <h2 class="page-title">哪种方式能让你一眼看出"周三最冷"？</h2>
    <div class="side-by-side">
      <div class="data-table"><h4>📋 表格</h4><table>
        <tr><td>周一</td><td>35°C</td></tr><tr><td>周二</td><td>33°C</td></tr>
        <tr><td>周三</td><td>29°C</td></tr><tr><td>周四</td><td>31°C</td></tr><tr><td>周五</td><td>36°C</td></tr>
      </table></div>
      <div class="chart-box"><h4>📈 折线图</h4><canvas id="chart-e0" height="160"></canvas></div>
    </div>
    <div class="options horizontal">
      <button class="opt-btn ${a==='A'?'wrong':''}" onclick="answerExplore(0,'A')" ${a?'disabled':''}><span class="opt-letter">A</span> 表格</button>
      <button class="opt-btn ${a==='B'?'correct':''}" onclick="answerExplore(0,'B')" ${a?'disabled':''}><span class="opt-letter">B</span> 折线图</button>
    </div>
    ${a==='B'?'<div class="feedback correct">✅ 对！图比表格快 10 倍。今天你要学会<strong>用 3 行 Python 把数字变成图</strong>。</div>':''}
    ${a==='A'?'<div class="feedback wrong">试试看——你能在 1 秒内从表格里找出最冷的一天吗？图可以一眼看出。正确答案是 <strong>B</strong>。</div>':''}
    ${a?'<div class="next-wrap"><button class="btn-primary" onclick="exploreNext()">继续 →</button></div>':''}`;
}
function initE0() {
  const ctx = document.getElementById('chart-e0'); if(!ctx) return;

function initE3() {

      type:'scatter',

      options:{plugins:{legend:{display:false}},scales:{x:{type:'linear',min:-.5,max:4.5,ticks:{color:'#8a8a9a',callback:v=>days[v]||'',stepSize:1},grid:{color:'#1e2230'}},y:{min:25,max:40,ticks:{color:'#8a8a9a',callback:v=>v+'°C'},grid:{color:'#1e2230'}}}}
    });
    return;
  }

  let placed=[];
  chartInstances.e3 = new Chart(ctx, {
    type:'scatter',
    data:{datasets:[{data:[],pointRadius:8,pointBackgroundColor:'#6c5ce7',pointBorderColor:'#fff',pointBorderWidth:2,showLine:true,borderColor:'#6c5ce744',tension:.3}]},
    options:{plugins:{legend:{display:false}},scales:{x:{type:'linear',min:-.5,max:4.5,ticks:{color:'#8a8a9a',callback:v=>days[v]||'',stepSize:1},grid:{color:'#1e2230'}},y:{min:25,max:40,ticks:{color:'#8a8a9a',callback:v=>v+'°C'},grid:{color:'#1e2230'}}},
      onClick:(e)=>{
        if(placed.length>=5) return;
        const chart=chartInstances.e3, xVal=Math.round(chart.scales.x.getValueForPixel(e.x));
        if(xVal<0||xVal>4||placed.find(p=>p.x===xVal)) return;

        chart.data.datasets[0].data=[...placed].sort((a,b)=>a.x-b.x);

}

    <div class="drill-header"><div class="drill-count">第 ${d.index+1}/${total} 题</div>
    <div class="drill-score"><span style="color:var(--danger)">${'❤️'.repeat(d.hearts)}${'🖤'.repeat(3-d.hearts)}</span><span>⭐ ${d.score*5}</span></div></div>
    <div class="page-card"><h2 class="page-title">${drill.question}</h2>`;
  if(drill.code) html+=`<div class="code-block">${drill.code}</div>`;

  switch(drill.type) {
    case 'predict': case 'choice':
      html+=`<div class="options">`;
      drill.options.forEach((opt,i)=>{
        let cls=''; if(ans!==undefined){if(i===drill.correct)cls='correct';else if(i===ans)cls='wrong';}
        html+=`<button class="opt-btn ${cls}" onclick="answerDrill(${i})" ${ans!==undefined?'disabled':''}><span class="opt-letter">${String.fromCharCode(65+i)}</span> ${opt}</button>`;
      });
      html+=`</div>`;
      if(ans!==undefined) html+=ans===drill.correct?`<div class="feedback correct">✅ 正确！${drill.explanation||''}</div>`:`<div class="feedback wrong">❌ 正确答案是 ${String.fromCharCode(65+drill.correct)}：${drill.options[drill.correct]}${drill.explanation?'。'+drill.explanation:''}</div>`;
      break;
    case 'fill':
      html+=`<div class="input-line" style="font-size:16px"><span style="color:#abb2bf">${drill.before||''}</span>
        <input id="drill-fill" type="text" placeholder="${drill.placeholder}" style="width:120px;font-size:16px" ${ans!==undefined?`disabled value="${drill.answer}"`:''}  class="${ans===true?'correct':(ans===false?'wrong':'')}" onkeyup="if(event.key==='Enter')submitDrillFill()">
        <span style="color:#abb2bf">${drill.after||''}</span>
        ${ans===undefined?'<button class="btn-primary" style="margin:0;padding:8px 20px" onclick="submitDrillFill()">确认</button>':''}</div>`;
      if(ans===true) html+=`<div class="feedback correct">✅ 正确！</div>`;
      if(ans===false) html+=`<div class="feedback wrong">❌ 正确答案是 <code class="code-inline">${drill.answer}</code></div>`;
      break;
    case 'order':
      if(ans===undefined) {
        const order=state.drill.currentOrder||drill.items.map((_,i)=>i);
        html+=`<div class="order-list" id="order-list">`;
        order.forEach((idx,pos)=>{ html+=`<div class="order-item" draggable="true" data-idx="${idx}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dropItem(event)"><span class="order-num">${pos+1}</span><code>${drill.items[idx]}</code></div>`; });
        html+=`</div><button class="btn-primary" onclick="submitOrder()">确认顺序</button>`;
      } else {
        html+=`<div class="order-list">`;
        drill.correct.forEach((idx,pos)=>{ html+=`<div class="order-item" style="border-color:var(--success)"><span class="order-num" style="background:var(--success);color:#fff">${pos+1}</span><code>${drill.items[idx]}</code></div>`; });
        html+=`</div>`;
        html+=ans===true?'<div class="feedback correct">✅ 顺序正确！import → 画图 → 装饰 → 显示。</div>':'<div class="feedback wrong">❌ 正确顺序如上。</div>';
      }
      break;
    case 'match':
      if(!state.drill.matchState) state.drill.matchState={selected:null,connections:{}};
      const ms=state.drill.matchState;
      if(ans!==undefined) {
        html+='<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">';
        drill.left.forEach((l,i)=>{ html+=`<div style="display:flex;align-items:center;gap:12px"><div class="match-item matched" style="flex:1">${l}</div><span style="color:var(--success)">→</span><div class="match-item matched" style="flex:1">${drill.right[drill.correctMap[i]]}</div></div>`; });
        html+='</div>';
        html+=ans===true?'<div class="feedback correct">✅ 全部正确！</div>':'<div class="feedback wrong">❌ 正确配对如上。</div>';
      } else {
        html+=`<p style="font-size:13px;color:var(--text-dim);margin-top:12px">先点左边，再点右边配对</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px"><div style="display:flex;flex-direction:column;gap:8px">`;
        drill.left.forEach((l,i)=>{ const conn=ms.connections[i]!==undefined,sel=ms.selected===i; html+=`<div class="match-item ${sel?'selected':''} ${conn?'matched':''}" onclick="matchSelectLeft(${i})">${l}${conn?' → '+drill.right[ms.connections[i]]:''}</div>`; });
        html+=`</div><div style="display:flex;flex-direction:column;gap:8px">`;
        drill.right.forEach((r,i)=>{ const used=Object.values(ms.connections).includes(i); html+=`<div class="match-item ${used?'matched':''}" onclick="matchSelectRight(${i})">${r}</div>`; });
        html+=`</div></div>`;
        if(Object.keys(ms.connections).length===drill.left.length) html+=`<button class="btn-primary" onclick="submitMatch()">确认配对</button>`;
      }
      break;
  }
  if(ans!==undefined) html+=`<div class="next-wrap"><button class="btn-primary" onclick="nextDrill()">下一题 →</button></div>`;
  html+=`</div>`;
  el.innerHTML=html;
}

function answerDrill(idx){const d=state.drill;if(d.answered[d.index]!==undefined)return;d.answered[d.index]=idx;if(idx===drills[d.index].correct)d.score++;else d.hearts=Math.max(0,d.hearts-1);render();}
function submitDrillFill(){const d=state.drill,drill=drills[d.index],v=document.getElementById('drill-fill').value.trim();const ok=v.toLowerCase()===drill.answer.toLowerCase();d.answered[d.index]=ok;if(ok)d.score++;else d.hearts=Math.max(0,d.hearts-1);render();}
function matchSelectLeft(i){if(state.drill.answered[state.drill.index]!==undefined)return;if(!state.drill.matchState)state.drill.matchState={selected:null,connections:{}};state.drill.matchState.selected=i;render();}
function matchSelectRight(i){if(state.drill.answered[state.drill.index]!==undefined)return;const ms=state.drill.matchState;if(ms.selected===null)return;ms.connections[ms.selected]=i;ms.selected=null;render();}
function submitMatch(){const d=drills[state.drill.index],ms=state.drill.matchState;let ok=true;d.left.forEach((_,i)=>{if(ms.connections[i]!==d.correctMap[i])ok=false;});state.drill.answered[state.drill.index]=ok;if(ok)state.drill.score++;else state.drill.hearts=Math.max(0,state.drill.hearts-1);state.drill.matchState=null;render();}
let draggedEl=null;
function dragStart(e){draggedEl=e.target.closest('.order-item');e.dataTransfer.effectAllowed='move';}
function dragOver(e){e.preventDefault();}
function dropItem(e){e.preventDefault();const target=e.target.closest('.order-item');if(!target||!draggedEl||target===draggedEl)return;const list=document.getElementById('order-list'),items=[...list.querySelectorAll('.order-item')],from=items.indexOf(draggedEl),to=items.indexOf(target);if(!state.drill.currentOrder)state.drill.currentOrder=drills[state.drill.index].items.map((_,i)=>i);const m=state.drill.currentOrder.splice(from,1)[0];state.drill.currentOrder.splice(to,0,m);render();}
function submitOrder(){const d=state.drill,drill=drills[d.index],order=d.currentOrder||drill.items.map((_,i)=>i),ok=JSON.stringify(order)===JSON.stringify(drill.correct);d.answered[d.index]=ok;if(ok)d.score++;else d.hearts=Math.max(0,d.hearts-1);d.currentOrder=null;render();}
function nextDrill(){state.drill.index++;state.drill.matchState=null;render();window.scrollTo({top:0,behavior:'smooth'});}

function startProject() {
  if (!pyodideReady) return;
  state.project.step = 0;
  render();
}

function saveProjectCode(step) {
  const ta = document.getElementById(`project-code-${step}`);
  if (ta) state.project[`code_${step}`] = ta.value;
}

function resetProjectCode(step) {
  state.project[`code_${step}`] = projectSteps[step].starter;
  state.project.outputs[step] = null;
  render();
}

function showHint(step, level) {
  state.project.hintLevel[step] = level + 1;
  render();
}

async function runProjectCode(step) {
  const ta = document.getElementById(`project-code-${step}`);
  if (!ta) return;
  const code = ta.value;
  state.project[`code_${step}`] = code;

  // Show running state
  const btn = document.getElementById('run-btn');
  if (btn) { btn.textContent = '⏳ 运行中...'; btn.disabled = true; }

  try {
    const result = await executePython(SETUP_CODE + '\n' + code);
    state.project.outputs[step] = result;
  } catch(e) {
    state.project.outputs[step] = { error: e.message, stdout: '', plots: [] };
  }

  render();
}

function nextProjectStep() {
  state.project.step++;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ==================== UTILS ====================
function friendlyError(err, step) {
  const e = err.toLowerCase();
  let msg = '';

  // NameError: variable not defined (e.g. color=blue without quotes)
  if (e.includes('nameerror')) {
    const match = err.match(/name '(\w+)' is not defined/);
    if (match) {
      const name = match[1];
      // Common case: forgot quotes around a string like color=red
      if (['red','blue','green','black','white','orange','yellow','steelblue'].includes(name)) {
        msg = `Python 不认识 <code>${name}</code>——你是不是忘了加引号？颜色名是字符串，要写成 <code>'${name}'</code>（带引号）。`;
      } else if (name === 'colors') {
        msg = `变量 <code>colors</code> 还没有定义。你需要先写一行代码创建它，再使用它。`;
      } else {
        msg = `Python 不认识 <code>${name}</code>。检查一下：是不是拼写错了？或者忘了加引号（字符串需要引号）？`;
      }
    }
  }
  // SyntaxError
  else if (e.includes('syntaxerror')) {
    if (e.includes('invalid syntax')) {
      msg = `代码格式有误。常见原因：<br>· 漏了引号、括号、逗号<br>· <code>linestyle</code> 的值 <code>'--'</code> 需要引号括起来`;
    } else if (e.includes('eol while scanning') || e.includes('unterminated string')) {
      msg = `字符串没有正确关闭——检查一下是不是少了一个引号 <code>'</code>。`;
    } else {
      msg = `代码格式有误，检查一下括号、引号、逗号是否配对。`;
    }
  }
  // TypeError: wrong arguments
  else if (e.includes('typeerror')) {
    if (e.includes('argument')) {
      msg = `函数参数不对。检查一下括号里的内容：参数个数对吗？参数名拼对了吗？`;
    } else {
      msg = `数据类型不对。比如：是不是把字符串和数字搞混了？`;
    }
  }
  // IndentationError
  else if (e.includes('indentationerror')) {
    msg = `缩进有问题——Python 对空格很敏感。检查一下代码前面的空格是否一致。`;
  }

  if (!msg) {
    msg = `代码出错了，看看上面的错误信息，试着理解 Python 在说什么。`;
  }

  if (step.mode === 'challenge') {
    msg += `<br><span style="color:var(--text-dim);font-size:13px">需要帮助？点下面的"💡 提示"按钮。</span>`;
  }
  return msg;
}

function noPlotHint(stepIdx) {
  const hints = {
    1: '代码运行了但没有产生图表。你需要写 <code>plt.plot(days, hours)</code> 画图，再写 <code>plt.show()</code> 显示。',
    2: '代码运行了但图表不完整。检查一下是不是没有写 <code>plt.title()</code>、<code>plt.xlabel()</code>、<code>plt.ylabel()</code>？',
    3: '代码运行了但没有看到警戒线。你需要加一行 <code>plt.axhline(...)</code>。',
    4: '代码运行了但没有柱状图。你需要先定义 <code>colors</code> 列表，再写 <code>plt.bar(days, hours, color=colors)</code>。',
  };
  return hints[stepIdx] || '代码运行了但没有产生图表。检查一下画图的代码是否正确。';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fireConfetti() {
  const o = document.createElement('div'); o.className = 'confetti-overlay'; document.body.appendChild(o);
  const colors = ['#6c5ce7','#a29bfe','#00b894','#feca57','#ff6b6b','#fd79a8','#74b9ff'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'vw'; p.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = Math.random()*.5+'s'; p.style.animationDuration = (2+Math.random()*1.5)+'s';
    p.style.width = (6+Math.random()*8)+'px'; p.style.height = (6+Math.random()*8)+'px'; o.appendChild(p);
  }
  setTimeout(() => o.remove(), 3500);
}
